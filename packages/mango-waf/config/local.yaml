# ╔══════════════════════════════════════════════════════╗
# ║  🥭 MANGO SHIELD — LOCAL DEV CONFIG (WINDOWS)      ║
# ║  Bảo vệ Auto-Code API (port 3000)                  ║
# ╚══════════════════════════════════════════════════════╝

server:
  listen: "0.0.0.0:8880"          # WAF listen HTTP only (no TLS for local dev)
  http_listen: ""
  read_timeout: 10s
  write_timeout: 30s
  idle_timeout: 120s
  max_header_bytes: 65536

tls:
  enabled: false                  # No TLS for local dev

domains:
  - name: "localhost"
    upstreams:
      - url: "http://127.0.0.1:3000"    # AutoCode API backend
    ssl: false

proxy:
  connect_timeout: 10s
  response_timeout: 60s
  max_idle_conns: 100
  keep_alive: true
  websocket: true

protection:
  mode: "monitor"                  # monitor mode for dev (log only, no blocking)
  rate_limit:
    enabled: true
    requests_per_second: 100
    burst: 200
    per_ip: true
    adaptive: true
  connection_limit:
    max_per_ip: 100
    max_total: 5000
  challenge:
    pow_difficulty: 3
    pow_adaptive: false
    cookie_ttl: 12h
    cookie_secret: "546869734973415365637265744b657931323334353637383930414243444546"
  ban:
    duration: 5m
    max_fails: 5
    use_iptables: false            # Not available on Windows
  emergency:
    rps_threshold: 5000
    duration: 30s
    auto_enable: false

fingerprint:
  ja3:
    enabled: true
    block_unknown: false
  ja4:
    enabled: true
  http2:
    enabled: true
  ua_consistency:
    enabled: true
    strict: false

intelligence:
  geoip:
    enabled: false                 # Disabled for local (no mmdb file)
    db_path: ""
    blocked_countries: []
    allowed_countries: []
  ip_reputation:
    enabled: false                 # Disabled for local
    abuseipdb_key: ""
    cache_ttl: 1h
  asn:
    enabled: false

detection:
  baseline:
    enabled: true
    learning_period: 1h            # Shorter for dev
  anomaly:
    enabled: true
    sensitivity: 0.5
  bot_classifier:
    enabled: true
    model_path: ""
  session_tracking:
    enabled: true
    ttl: 30m

waf:
  enabled: true
  owasp_rules: true
  custom_rules_path: ""
  paranoia_level: 1                # Low for dev

logging:
  level: "info"
  format: "text"                   # Human readable for dev
  file: ""                         # Console only
  max_size_mb: 100
  max_backups: 5
  attack_log: ""

metrics:
  enabled: false

dashboard:
  enabled: true
  listen: "0.0.0.0:9090"         # WAF Dashboard
  username: "admin"
  password: "admin123"
  jwt_secret: ""

alerts:
  telegram:
    enabled: false
    token: ""
    chat_id: ""
  discord:
    enabled: false
    webhook_url: ""
  webhook:
    enabled: false
    url: ""
    secret: ""

cdn:
  enabled: true
  memory_limit_mb: 128
  static_extensions:
    - ".css"
    - ".js"
    - ".png"
    - ".jpg"
    - ".svg"
    - ".woff2"
    - ".ico"
  bypass_rules:
    - "/api/*"
  bypass_cookies: []
  bypass_headers: []

cluster:
  enabled: false                   # Single node for local dev
  node_name: "local-dev"
  bind_port: 7946
  advertise_ip: ""
  secret_key: "AES-32-MANGO-SHIELD-GOSSIP-KEY!!"
  join_peers: []
