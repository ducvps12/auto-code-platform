version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autocode-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: autocode
      POSTGRES_PASSWORD: autocode
      POSTGRES_DB: autocode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocode"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autocode-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: autocode-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    container_name: autocode-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - worker_workspaces:/tmp/autocode-workspaces
      - /var/run/docker.sock:/var/run/docker.sock  # for spawning isolated containers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  worker_workspaces:
